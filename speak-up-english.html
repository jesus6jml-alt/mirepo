<!DOCTYPE html>
<html lang="es">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

html, body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(160deg, #EAF2FF 0%, #EAFBF4 100%);
  display: flex;
  justify-content: center;
  padding: 28px 16px;
  box-sizing: border-box;
  transition: background .3s;
}
body.dark-page {
  background: linear-gradient(160deg, #12141A 0%, #1B2530 100%);
}

.cc-app {
  --bg: #FFFFFF;
  --surface: #F7F8FA;
  --surface2: #EFF1F5;
  --ink: #12141A;
  --ink-soft: #6B7280;
  --line: #E7E9ED;

  --blue: #2D7FF9;
  --green: #16C172;
  --orange: #FF7A29;
  --violet: #8B5CF6;
  --pink: #F43F5E;
  --teal: #14B8A6;

  --en: var(--blue);
  --pt: var(--green);
  --fc: var(--orange);
  --aj: var(--violet);
  --ex: var(--pink);
  --mind: var(--teal);

  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  border-radius: 20px;
  padding: 22px 20px 26px;
  max-width: 1600px;
  width: 100%;
  margin: 0 auto;
  border: 1px solid var(--line);
  box-shadow: 0 20px 50px rgba(30,40,80,0.12);
  position: relative;
  transition: background .3s, border-color .3s;
}
.cc-app.eval-mode {
  background: linear-gradient(180deg, #FFF3E8, #FFFFFF 140px);
  border-color: var(--orange);
}
.cc-app.eval-mode .cc-nav { background: #FFE7D2; }
.cc-app.dark {
  --bg: #16181D;
  --surface: #1F2228;
  --surface2: #262A32;
  --ink: #F0F1F3;
  --ink-soft: #9AA0AC;
  --line: #333842;
}
.cc-app.dark.eval-mode { background: linear-gradient(180deg, #2A2216, #16181D 140px); }
.cc-app.dark .cc-nav button.active { background: #F0F1F3; color: #16181D; }
.cc-app.dark .cc-check { background: #16181D; }
.cc-app.dark input, .cc-app.dark textarea, .cc-app.dark select { background: #16181D; color: var(--ink); }
.cc-app.dark .cc-cell { color: var(--ink-soft); }
.cc-dog {
  width: 34px; height: 32px; flex: none; cursor: default;
}
.cc-app * { box-sizing: border-box; }

.cc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; gap:10px; flex-wrap:wrap; }
.cc-title { font-weight:800; font-size:21px; margin:0; letter-spacing:-0.01em; }
.cc-brand { display:flex; align-items:center; gap:10px; }
.cc-logo { width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--blue),var(--green)); display:flex; align-items:center; justify-content:center; flex:none; box-shadow:0 3px 10px rgba(45,127,249,0.35); }
.cc-sub { font-size:12px; color:var(--ink-soft); margin-top:3px; }
.cc-countdown { text-align:right; }
.cc-countdown .n { font-weight:800; font-size:24px; color:var(--orange); line-height:1; }
.cc-countdown .l { font-size:10.5px; color:var(--ink-soft); }

.cc-nav { display:flex; flex-wrap:wrap; gap:6px; background:var(--surface); border-radius:14px; padding:5px; margin-bottom:20px; }
.cc-nav button {
  flex:1 1 auto; min-width:88px; font-weight:600; font-size:12.5px; padding:9px 8px;
  border:none; border-radius:10px; background:transparent; color:var(--ink-soft); cursor:pointer;
  white-space:nowrap; transition:background .15s,color .15s;
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
}
.cc-nav button.active { background:linear-gradient(135deg,var(--blue),var(--violet)); color:#fff; box-shadow:0 2px 8px rgba(45,127,249,0.3); }

.cc-loading { text-align:center; padding:40px 0; color:var(--ink-soft); font-size:13px; }

/* HOY */
.cc-today-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.cc-today-date { font-size:16px; font-weight:700; }
.cc-phase-badge { font-size:11px; font-weight:600; color:var(--ink-soft); margin-top:3px; }
.cc-back { font-size:12px; color:var(--blue); background:none; border:none; cursor:pointer; font-weight:600; }

.cc-done-banner {
  display:none; align-items:center; gap:8px; background:linear-gradient(90deg,var(--green),var(--blue));
  color:#fff; font-weight:600; font-size:13px; padding:10px 14px; border-radius:12px; margin-bottom:16px;
}
.cc-done-banner.show { display:flex; }
.cc-eval-banner {
  display:flex; align-items:center; gap:8px; background:linear-gradient(90deg,var(--orange),var(--pink));
  color:#fff; font-weight:600; font-size:13px; padding:10px 14px; border-radius:12px; margin-bottom:16px;
  cursor:pointer;
}
.cc-banner-check { display:inline-block; width:16px; height:16px; border-radius:50%; background:rgba(255,255,255,0.28); position:relative; flex:none; }
.cc-banner-check::after { content:''; position:absolute; left:5px; top:6px; width:6px; height:4px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg); }

.cc-habit { border:1px solid var(--line); border-left:4px solid var(--card-accent, var(--line)); border-radius:14px; padding:14px 16px; margin-bottom:10px; box-shadow:0 1px 3px rgba(20,20,30,0.05); transition:box-shadow .2s, transform .15s; }
.cc-habit:hover { box-shadow:0 4px 14px rgba(20,20,30,0.09); }
.cc-habit-head { display:flex; align-items:center; gap:9px; margin-bottom:8px; }
.cc-habit-icon { width:26px; height:26px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex:none; }
.cc-habit-name { font-weight:700; font-size:14.5px; flex:1; }
.cc-habit-frac { font-size:12px; color:var(--ink-soft); font-weight:600; }

.cc-sub-row { display:flex; align-items:flex-start; gap:10px; padding:6px 0; }
.cc-check {
  width:22px; height:22px; border-radius:7px; border:2px solid var(--habit-color); background:#fff;
  cursor:pointer; flex:none; display:flex; align-items:center; justify-content:center; margin-top:1px;
  transition:transform .1s;
}
.cc-check:active { transform:scale(0.88); }
.cc-check.on { background:var(--habit-color); }
.cc-check.on::after { content:''; width:8px; height:6px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translate(1px,-1px); }
.cc-sub-text { font-size:13.5px; line-height:1.35; }
.cc-sub-hint { font-size:11.5px; color:var(--ink-soft); display:block; margin-top:1px; }

.cc-extra { margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); }
.cc-extra label { font-size:11px; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:4px; }
.cc-extra input, .cc-extra textarea,
.cc-suggest-wrap input, .cc-suggest-wrap textarea,
.cc-habit input, .cc-habit textarea,
.cc-suggest-wrap input, .cc-suggest-wrap textarea {
  font-family:'Inter',sans-serif; font-size:13px; padding:8px 10px; border-radius:9px;
  border:1.5px solid var(--line); width:100%; margin-bottom:8px; color:var(--ink); background:#fff;
  box-sizing:border-box; display:block;
}
.cc-extra-btn { font-size:12px; font-weight:700; border:none; border-radius:20px; padding:8px 14px; cursor:pointer; color:#fff; display:inline-flex; align-items:center; gap:6px; transition:transform .12s, box-shadow .12s; box-shadow:0 2px 6px rgba(20,20,30,0.15); }
.cc-extra-btn:hover { transform:translateY(-1px); box-shadow:0 4px 10px rgba(20,20,30,0.2); }
.cc-extra-btn:active { transform:translateY(0); }
.cc-extra-btn:disabled { opacity:0.6; cursor:default; }
.cc-mic-inline {
  font-size:11px; font-weight:600; color:var(--ink-soft); background:var(--surface);
  border:1px solid var(--line); border-radius:20px; padding:5px 10px; cursor:pointer;
  display:inline-flex; align-items:center; gap:5px; margin-bottom:8px;
}
.cc-mic-inline.listening { background:var(--pink); color:#fff; border-color:var(--pink); }
.cc-feedback { margin-top:8px; background:var(--surface); border-radius:10px; padding:10px 12px; font-size:12.5px; line-height:1.5; white-space:pre-wrap; }
.cc-feedback.loading { color:var(--ink-soft); font-style:italic; }
.cc-suggest-wrap { margin-top:14px; }
.cc-suggest-list { margin-top:8px; }
.cc-wheel-row { display:flex; align-items:center; gap:16px; margin-bottom:8px; }
.cc-wheel-wrap { position:relative; width:70px; height:70px; flex:none; }
.cc-wheel {
  width:70px; height:70px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 2px var(--line);
  background: conic-gradient(var(--blue) 0deg 45deg, var(--green) 45deg 90deg, var(--orange) 90deg 135deg, var(--violet) 135deg 180deg, var(--pink) 180deg 225deg, var(--blue) 225deg 270deg, var(--green) 270deg 315deg, var(--orange) 315deg 360deg);
  transition: transform 2s cubic-bezier(.2,.8,.2,1);
}
.cc-wheel-pointer {
  position:absolute; top:-6px; left:50%; transform:translateX(-50%);
  width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-top:10px solid var(--ink); z-index:2;
}
.cc-img-box { background:var(--surface2); border-radius:12px; padding:8px; margin-bottom:8px; display:flex; align-items:center; justify-content:center; }
.cc-img-caption { font-size:12px; font-style:italic; color:var(--ink-soft); text-align:center; margin-bottom:10px; }

/* PROGRESO */
.cc-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:22px; }
.cc-stat { background:var(--surface); border-radius:12px; padding:12px 8px; text-align:center; border-top:3px solid var(--blue); }
.cc-stat:nth-child(2){ border-top-color:var(--green); }
.cc-stat:nth-child(3){ border-top-color:var(--orange); }
.cc-stat:nth-child(4){ border-top-color:var(--violet); }
.cc-stat .n { font-size:19px; font-weight:800; }
.cc-stat .l { font-size:10px; color:var(--ink-soft); margin-top:2px; }

.cc-section-title { font-size:14.5px; font-weight:700; margin:22px 0 10px; }

.cc-months { display:flex; flex-wrap:wrap; gap:12px; }
.cc-month { background:var(--surface); border-radius:12px; padding:9px; flex:1 1 200px; min-width:190px; }
.cc-month-label { font-size:11px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; display:block; }
.cc-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cc-cell { aspect-ratio:1; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:9px; cursor:pointer; color:var(--ink-soft); border:1.5px solid transparent; background:var(--surface2); }
.cc-cell.pad { visibility:hidden; cursor:default; }
.cc-cell.future { opacity:0.3; cursor:default; }
.cc-cell.selected { border-color:var(--ink); }

.cc-bars { display:flex; flex-direction:column; gap:10px; }
.cc-bar-row { display:flex; align-items:center; gap:10px; }
.cc-bar-label { font-size:12.5px; font-weight:600; width:120px; flex:none; }
.cc-bar-track { flex:1; height:9px; background:var(--surface2); border-radius:6px; overflow:hidden; }
.cc-bar-fill { height:100%; border-radius:6px; transition:width .3s; }
.cc-bar-pct { font-size:11px; width:36px; text-align:right; color:var(--ink-soft); flex:none; }

/* VOCAB */
.cc-vocab-tabs { display:flex; gap:6px; margin-bottom:14px; }
.cc-vtab { font-size:12px; font-weight:600; padding:7px 12px; border-radius:20px; border:1.5px solid var(--line); background:#fff; color:var(--ink-soft); cursor:pointer; }
.cc-vtab.active { border-color:var(--ink); color:var(--ink); }

.cc-empty { text-align:center; padding:36px 10px; color:var(--ink-soft); font-size:13px; }

.cc-card { background:var(--surface); border-radius:16px; padding:32px 20px; text-align:center; min-height:140px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; position:relative; }
.cc-card-cat { position:absolute; top:12px; left:12px; font-size:10px; font-weight:700; color:#fff; padding:3px 9px; border-radius:20px; }
.cc-card-front { font-size:21px; font-weight:800; }
.cc-card-back { font-size:15px; }
.cc-card-example { font-size:11.5px; color:var(--ink-soft); max-width:400px; }
.cc-card-hint { font-size:10.5px; color:var(--ink-soft); }

.cc-grade-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:14px; }

.cc-path { position:relative; padding:16px 0 8px; }
.cc-path::before {
  content:''; position:absolute; top:10px; bottom:30px; left:50%; transform:translateX(-50%);
  border-left:4px dashed var(--surface2); z-index:0;
}
.cc-path-row { display:flex; margin-bottom:22px; position:relative; z-index:1; }
.cc-path-row.left { justify-content:flex-start; padding-left:8%; }
.cc-path-row.center { justify-content:center; }
.cc-path-row.right { justify-content:flex-end; padding-right:8%; }
.cc-path-node-col { display:flex; flex-direction:column; align-items:center; gap:6px; }
.cc-path-node {
  width:64px; height:64px; border-radius:50%; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 5px 0 rgba(20,20,30,0.18); transition:transform .1s;
}
.cc-path-node:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(20,20,30,0.18); }
.cc-path-node:disabled { cursor:default; box-shadow:none; }
.cc-path-node.pulse { animation: cc-pulse 1.6s ease-in-out infinite; }
@keyframes cc-pulse {
  0%, 100% { box-shadow:0 5px 0 rgba(20,20,30,0.18), 0 0 0 0 rgba(45,127,249,0.5); }
  50% { box-shadow:0 5px 0 rgba(20,20,30,0.18), 0 0 0 10px rgba(45,127,249,0); }
}
.cc-path-label { font-size:11px; font-weight:700; text-align:center; max-width:100px; color:var(--ink-soft); }

.cc-ipa-hero {
  background:linear-gradient(135deg,var(--blue),var(--violet));
  border-radius:18px; padding:20px 18px; margin-bottom:16px; color:#fff;
  box-shadow:0 8px 20px rgba(45,127,249,0.25);
}
.cc-ipa-hero-title { font-size:19px; font-weight:800; margin-bottom:4px; }
.cc-ipa-hero-sub { font-size:12.5px; opacity:0.9; }
.cc-ipa-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(84px,1fr)); gap:10px; margin-bottom:18px; }
.cc-ipa-card {
  background:#fff; border:2px solid var(--ipa-color); border-radius:14px; padding:12px 6px;
  display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
  transition:transform .12s, box-shadow .12s;
}
.cc-ipa-card:hover { transform:translateY(-2px) scale(1.03); box-shadow:0 6px 14px color-mix(in srgb, var(--ipa-color) 35%, transparent); }
.cc-ipa-card:active { transform:translateY(0) scale(0.98); }
.cc-ipa-symbol { font-size:20px; font-weight:800; color:var(--ipa-color); }
.cc-ipa-word { font-size:11px; color:var(--ink-soft); font-weight:600; }
.cc-app.dark .cc-ipa-card { background:var(--surface); }
.cc-grade-btn { font-size:11.5px; font-weight:600; padding:11px 6px; border-radius:12px; cursor:pointer; border:1.5px solid var(--line); background:#fff; line-height:1.3; }
.cc-grade-btn.bad { border-color:var(--pink); color:var(--pink); }
.cc-grade-btn.mid { border-color:var(--orange); color:var(--orange); }
.cc-grade-btn.good { border-color:var(--green); color:var(--green); }
.cc-grade-btn:active { transform:scale(0.96); }

.cc-form { display:flex; flex-direction:column; gap:9px; background:var(--surface); border-radius:14px; padding:16px; margin-bottom:16px; }
.cc-form label { font-size:11px; font-weight:600; color:var(--ink-soft); }
.cc-form input, .cc-form select, .cc-form textarea { font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 10px; border-radius:9px; border:1.5px solid var(--line); background:#fff; color:var(--ink); width:100%; }
.cc-add-btn { font-size:13px; font-weight:700; background:var(--ink); color:#fff; border:none; border-radius:20px; padding:11px; cursor:pointer; margin-top:2px; }

.cc-list { display:flex; flex-direction:column; gap:7px; }
.cc-list-item { display:flex; align-items:center; gap:9px; background:var(--surface); border-radius:10px; padding:9px 12px; }
.cc-list-cat { font-size:9px; font-weight:700; color:#fff; padding:2px 7px; border-radius:20px; flex:none; }
.cc-list-front { font-weight:600; font-size:13px; flex:1; }
.cc-list-back { font-size:12px; color:var(--ink-soft); flex:1; }
.cc-list-box { font-size:10px; color:var(--ink-soft); flex:none; }
.cc-del { background:none; border:none; color:var(--pink); font-size:11px; font-weight:600; cursor:pointer; flex:none; }

/* GUIA */
.cc-acc { border:1px solid var(--line); border-radius:14px; margin-bottom:8px; overflow:hidden; }
.cc-acc-head { display:flex; align-items:center; gap:10px; padding:13px 16px; cursor:pointer; background:#fff; }
.cc-acc-dot { width:10px; height:10px; border-radius:50%; flex:none; }
.cc-acc-title { font-weight:600; font-size:14px; flex:1; }
.cc-acc-arrow-shape { display:inline-block; width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent; border-top:5px solid var(--ink-soft); transition:transform .15s; flex:none; }
.cc-acc.open .cc-acc-arrow-shape { transform:rotate(180deg); }
.cc-acc-body { display:none; padding:0 16px 16px; font-size:13px; line-height:1.55; color:var(--ink); }
.cc-acc.open .cc-acc-body { display:block; }
.cc-acc-body ul { margin:6px 0; padding-left:18px; }
.cc-acc-body li { margin-bottom:4px; }
.cc-acc-body b { font-weight:700; }

.cc-footer { display:flex; justify-content:space-between; align-items:center; margin-top:20px; padding-top:14px; border-top:1px solid var(--line); }
.cc-note { font-size:10.5px; color:var(--ink-soft); }
.cc-reset { font-size:10.5px; font-weight:600; color:var(--pink); background:none; border:1.5px solid var(--pink); border-radius:20px; padding:6px 12px; cursor:pointer; }

@media (max-width:520px){
  .cc-stats{ grid-template-columns:repeat(2,1fr); }
  .cc-title{ font-size:18px; }
}
</style>
</head>

<div class="cc-app" id="ccApp"><div class="cc-loading">Cargando</div></div>

<script>
(function(){
  const HABITS = [
    { id:'en', name:'Inglés', color:'--en',
      subtasks:[
        { id:'drill', text:'Phonetic shadowing and recording (30 minutes)', hint:()=>"Rachel's English, fixed every day" },
        { id:'anki',  text:'Vocabulary review (15 minutes)', hint:()=>'Use the Vocabulary tab right here' },
        { id:'input', text:'Input menu (25 to 30 minutes)', hint:(d,phase)=>{ const podcast = phase===1?'Podcast (Speak English With Vanessa)':phase===2?'Podcast (Philosophize This)':'Podcast (This American Life)'; return [podcast,'StrawberryPark (slang hunting)','Show with subtitles','Music (lyrics)','StrawberryPark (slang hunting)','Long session: full show or podcast','Review, no new input'][d]; } },
        { id:'output', text:'Output menu (10 to 15 minutes)', hint:d=>['Self-talk: your day','Record yourself explaining a topic','Discord (voice)','Self-talk: philosophical debate','Discord (voice)','Discord optional','Rest, no new output'][d] },
      ]},
  ];

  const CATS = {
    'en-formal': { label:'Inglés formal', color:'#2D7FF9' },
    'en-slang':  { label:'Inglés slang', color:'#FF7A29' },
    'other':     { label:'Otro', color:'#8B5CF6' },
  };
  const BOX_DAYS = [1,2,4,8,16,32];

  const LESSON_NODES = [
    { id:'l1', title:'Vocales tensas y relajadas', topic:'la diferencia entre vocales tensas y relajadas en inglés, como en sheep versus ship' },
    { id:'l2', title:'La erre americana', topic:'el sonido de la R americana y en qué se diferencia de la R en español' },
    { id:'l3', title:'T suave y linking', topic:'la T que suena como D entre vocales, y cómo se unen las palabras al hablar en inglés americano' },
    { id:'l4', title:'Entonación', topic:'los patrones de entonación de una oración en inglés americano' },
    { id:'l5', title:'Contracciones', topic:'contracciones comunes en inglés hablado como gonna, wanna, gotta, kinda' },
    { id:'l6', title:'Phrasal verbs: rutina diaria', topic:'phrasal verbs sobre la rutina diaria en inglés, como get up, wake up, put on, take off, turn on, turn off' },

    const aiResult = await callAI(

  function shuffleArr(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function setupGameOptions(){
    const pool = pickLangCards(gameLang);
    const correct = gameQueue[gameIndex];
    const distractorCount = Math.min(3, pool.length-1);
    const distractors = shuffleArr(pool.filter(c=>c.id!==correct.id)).slice(0,distractorCount).map(c=>c.back);
    gameOptions = shuffleArr([correct.back, ...distractors]);
    gameAnswered = false; gameSelected = -1;
  }
  function startGame(lang){
    gameLang = lang;

    if (gameIndex >= gameQueue.length){
      const pct = Math.round((gameScore/gameQueue.length)*100);
      return `<div class="cc-card">
        <div class="cc-card-front">${gameScore}/${gameQueue.length}</div>
        <div class="cc-card-hint">${pct}% correcto</div>

    }

  function bindGame(){

  function bindGramCategory(){
    root.querySelectorAll('[data-lesson]').forEach(b=>b.addEventListener('click', ()=>{
      if (!b.dataset.lesson) return;
      activeLessonId = b.dataset.lesson; lessonExercises=[]; lessonIndex=0; lessonScore=0; render();
    }));
    const genBtn = document.getElementById('ccLessonGen');
    if (genBtn) genBtn.addEventListener('click', async ()=>{
      genBtn.disabled = true; genBtn.textContent = 'Generating...';
      const node = LESSON_NODES.find(n=>n.id===activeLessonId);
      async function attempt(){
        const result = await callAI(
          `Tema: ${node.topic}`,
          'Create 4 short Duolingo style English exercises about the given topic, for a B1 student moving to B2. Respond only with a JSON array, no text before or after, no code blocks. Exact format: [{"type":"mc","question":"...","options":["a","b","c","d"],"answer":"b"},{"type":"text","question":"...","options":[],"answer":"..."}]. Two mc type exercises and two text type. Questions in English, practice content in English.'
        );
        const start = result.indexOf('[');
        const end = result.lastIndexOf(']');
        if (start===-1 || end===-1 || end<start) throw new Error('sin arreglo JSON reconocible');
        const parsed = JSON.parse(result.slice(start, end+1));
        if (!Array.isArray(parsed) || !parsed.length) throw new Error('arreglo vacío');
        return parsed;
      }
      try {
        let parsed;
        try { parsed = await attempt(); }
        catch(e1){ genBtn.textContent = 'Retrying...'; parsed = await attempt(); }
        lessonExercises = parsed.slice(0,4).map(ex=>({ type: ex.type==='mc'?'mc':'text', question: ex.question||'', options: Array.isArray(ex.options)?ex.options:[], answer: ex.answer||'' }));
        lessonIndex = 0; lessonScore = 0; lessonAnswered = false; lessonSelected = -1; lessonTextAnswer='';
      } catch(e){ alert('El modelo gratuito no respondió con un formato usable después de dos intentos. Prueba de nuevo, a veces cambia el modelo que te toca y funciona mejor.'); }
      genBtn.disabled = false;
      render();
    });
    const exitBtn = document.getElementById('ccLessonExit');
    if (exitBtn) exitBtn.addEventListener('click', ()=>{ activeLessonId=null; lessonExercises=[]; render(); });
    root.querySelectorAll('[data-li]').forEach(b=>b.addEventListener('click', ()=>{
      if (lessonAnswered) return;
      lessonSelected = parseInt(b.dataset.li);
      lessonAnswered = true;
      const ex = lessonExercises[lessonIndex];
      if (ex.options[lessonSelected]===ex.answer){ lessonScore++; playSuccess(); } else playTone(220,0.2);
      render();
    }));
    const textInput = document.getElementById('ccLessonTextAns');
    if (textInput) textInput.addEventListener('input', ()=>{ lessonTextAnswer = textInput.value; });
    const checkBtn = document.getElementById('ccLessonCheck');
    if (checkBtn) checkBtn.addEventListener('click', ()=>{
      const ex = lessonExercises[lessonIndex];
      const correct = (lessonTextAnswer||'').trim().toLowerCase() === (ex.answer||'').trim().toLowerCase();
      lessonAnswered = true; lessonSelected = correct?1:0;
      if (correct){ lessonScore++; playSuccess(); } else playTone(220,0.2);
      render();
    });
    const nextBtn = document.getElementById('ccLessonNext');
    if (nextBtn) nextBtn.addEventListener('click', ()=>{
      lessonIndex++; lessonAnswered=false; lessonSelected=-1; lessonTextAnswer='';
      if (lessonIndex >= lessonExercises.length){
        if (!state.lessons.done[activeLessonId]){ state.lessons.xp += 20; state.lessons.done[activeLessonId] = true; bumpSkillStat('gram'); save(); }
      }
      render();
    });
  }

  function bindReadingCategory(){
    root.querySelectorAll('[data-genre]').forEach(b=>b.addEventListener('click', ()=>{
      readingGenre = b.dataset.genre; readingPassage=''; readingQuestions=[]; readingAnswers=[]; readingGraded=false; readingFeedback=''; readingLiked=false;
      render();
    }));
    const changeGenreBtn = document.getElementById('ccReadingChangeGenre');
    if (changeGenreBtn) changeGenreBtn.addEventListener('click', ()=>{ readingGenre=null; readingPassage=''; render(); });
    root.querySelectorAll('[data-rlen]').forEach(b=>b.addEventListener('click', ()=>{ readingLength = b.dataset.rlen; render(); }));
    const genBtn = document.getElementById('ccReadingGen');
    if (genBtn) genBtn.addEventListener('click', async ()=>{
      genBtn.disabled = true; genBtn.textContent = 'Generating...';
      const liked = (state.readingLikes[readingGenre]||[]).slice(-3);
      const likedLine = liked.length ? ` The user liked stories with this essence in this genre before: ${liked.map(l=>l.slice(0,150)).join(' | ')}. Generate something with a similar spirit or tone, but a completely new story, do not repeat the plot.` : '';
      const lengthSpec = readingLength==='largo' ? '220 to 320 words, with 4 comprehension questions' : readingLength==='mediano' ? '140 to 190 words, with 3 comprehension questions' : '80 to 120 words, with 3 comprehension questions';
      const minWords = readingLength==='largo' ? 150 : readingLength==='mediano' ? 90 : 50;
      async function attemptReading(){
        const result = await callAI(
          `Genre: ${readingGenre}.${likedLine}`,
          `Write a text in English of ${lengthSpec}, of the indicated genre, suitable for all audiences and without explicit graphic violence even if the genre is suspense or horror, appropriate for a B1 student moving to B2. Then write the comprehension questions about that text, in English, numbered starting at 1. Respond with this exact format and nothing else, no explanations or comments about the task: TEXT: the text here QUESTIONS: 1) first question 2) second question and so on`
        );
        const parts = result.split(/PREGUNTAS:|QUESTIONS:/i);
        const passage = (parts[0]||'').replace(/TEXTO:|TEXT:/i,'').trim();
        const wordCount = passage.split(/\s+/).filter(Boolean).length;
        const looksInvalid = /\bI (should|need to|can't|must)\b|\bthe user\b|\bwait,?\b|\bhowever,? in\b|User Safety/i.test(passage);
        if (wordCount < minWords || looksInvalid) throw new Error('text too short, invalid, or looks like internal reasoning');
        const qBlock = parts[1] || '';
        const maxQ = readingLength==='largo' ? 4 : 3;
        let questions = qBlock.split(/\d\)/).map(s=>s.trim()).filter(Boolean).slice(0,maxQ);
        if (!questions.length) questions = ['Question 1','Question 2','Question 3'];
        return { passage, questions };
      }
      try {
        let out, lastErr;
        for (let i=0;i<3;i++){
          try { out = await attemptReading(); break; }
          catch(e1){ lastErr = e1; genBtn.textContent = `Retrying (${i+2}/3)...`; }
        }
        if (!out) throw lastErr || new Error('failed');
        readingPassage = out.passage;
        readingQuestions = out.questions;
        readingAnswers = readingQuestions.map(()=>''); readingGraded = false; readingFeedback=''; readingLiked=false;
      } catch(e){ alert('The free model did not generate usable text after three attempts (sometimes it blocks certain genres due to its own filters). Try again or with a different genre.'); }
      finally { genBtn.disabled = false; render(); }
    });
    const likeBtn = document.getElementById('ccReadingLike');
    if (likeBtn) likeBtn.addEventListener('click', ()=>{
      if (readingLiked) return;
      if (!state.readingLikes[readingGenre]) state.readingLikes[readingGenre] = [];
      state.readingLikes[readingGenre].push(readingPassage);
      state.readingLikes[readingGenre] = state.readingLikes[readingGenre].slice(-5);
      readingLiked = true;
      save(); render();
    });
    readingQuestions.forEach((q,i)=>{
      const ans = document.getElementById(`ccReadingAns-${i}`);
      if (ans) ans.addEventListener('input', ()=>{ readingAnswers[i]=ans.value; });
    });
    const gradeBtn = document.getElementById('ccReadingGrade');
    if (gradeBtn) gradeBtn.addEventListener('click', async ()=>{
      gradeBtn.disabled = true; gradeBtn.textContent = 'Corrigiendo...';
      try {
        const qa = readingQuestions.map((q,i)=>`Pregunta: ${q} Respuesta: ${readingAnswers[i]||'sin responder'}`).join(' ');
        const result = await callAI(
          `Texto original: ${readingPassage}. ${qa}`,
          'You are a reading comprehension evaluator in English. Compare the answers with the original text and say if they are correct. Give a score out of one hundred on the first line with the format Score: number. Then, for each answer, quote the specific part of the text relevant to it and explain exactly what was right or wrong, do not just say "improve grammar", point to the exact issue. Maximum 120 words. Do not use em dashes or unusual symbols. Respond in English.'
        );
        readingFeedback = result || 'Could not grade, try again.';
        readingGraded = true;
        bumpSkillStat('reading');
      } catch(e){ alert('There was an error correcting, try again.'); }
      gradeBtn.disabled = false;
      render();
    });
    const nextReadBtn = document.getElementById('ccReadingNext');
    if (nextReadBtn) nextReadBtn.addEventListener('click', ()=>{
      readingPassage=''; readingQuestions=[]; readingAnswers=[]; readingGraded=false; readingFeedback=''; readingLiked=false;
      followupChats.reading = [];
      render();
    });
    if (readingGraded) bindFollowup('reading', ()=>`Text: ${readingPassage}. Feedback given: ${readingFeedback}`);
  }

  function renderIPA(){
    if (!ipaQuizWords.length) startIpaQuiz();
    const vowels = IPA_SOUNDS.filter(s=>s.type==='vowel');
    const consonants = IPA_SOUNDS.filter(s=>s.type==='consonant');
    return `
      <div class="cc-ipa-hero">
        <div class="cc-ipa-hero-title">Phonetic alphabet (IPA)</div>
        <div class="cc-ipa-hero-sub">Tap any symbol to hear its sound with an example word</div>
      </div>
      <p class="cc-section-title">Vocales</p>
      <div class="cc-ipa-grid">
        ${vowels.map(s=>renderIpaCard(s,'var(--blue)')).join('')}
      </div>
      <p class="cc-section-title">Consonantes</p>
      <div class="cc-ipa-grid">
        ${consonants.map(s=>renderIpaCard(s,'var(--violet)')).join('')}
      </div>
      <p class="cc-section-title">Practice your ear with IPA</p>
      <div class="cc-habit" style="border-left-color:var(--en)">
        <div class="cc-habit-frac" style="margin-bottom:10px">Puntaje: ${ipaQuizScore}/${ipaQuizTotal}</div>
        <div class="cc-card-front" style="font-size:24px;margin-bottom:6px">/${ipaQuizTarget}/</div>
        <div class="cc-card-hint" style="margin-bottom:10px">Which word has this sound?</div>
        <button class="cc-extra-btn" id="ccIpaPlay" style="background:var(--en)">${icon('audio','#fff',14)} Listen to word</button>
        <div class="cc-grade-row" style="grid-template-columns:1fr 1fr;margin-top:10px">
          ${ipaQuizWords.map((w,i)=>{
            let cls='';
            if (ipaQuizAnswered){ if (w.word===ipaQuizSpoken) cls='good'; else if (i===ipaQuizSelectedIdx) cls='bad'; }
            return `<button class="cc-grade-btn ${cls}" data-ipaq="${i}" ${ipaQuizAnswered?'disabled':''}>${w.word}</button>`;
          }).join('')}
        </div>
        ${ipaQuizAnswered ? `<button class="cc-extra-btn" id="ccIpaQuizNext" style="background:var(--ink);margin-top:10px">Siguiente</button>` : ''}
      </div>
    `;
  }
  function renderIpaCard(s, color){
    return `<button class="cc-ipa-card" style="--ipa-color:${color}" data-ipa="${s.symbol}">
      <span class="cc-ipa-symbol">/${s.symbol}/</span>
      <span class="cc-ipa-word">${s.example}</span>
    </button>`;
  }
  const IPA_CONFUSABLES = {
    'i':['ɪ'], 'ɪ':['i','ɛ'], 'ɛ':['æ','ɪ'], 'æ':['ɛ','ʌ'], 'ʌ':['ɑ','æ'],
    'ɑ':['ʌ','ɔ'], 'ɔ':['ɑ','oʊ'], 'oʊ':['ɔ','ʊ'], 'ʊ':['u','oʊ'], 'u':['ʊ'],
    'θ':['ð','s'], 'ð':['θ','d'], 's':['θ','ʃ'], 'z':['ʒ'], 'ʃ':['tʃ','s'],
    'ʒ':['dʒ','z'], 'tʃ':['ʃ','dʒ'], 'dʒ':['ʒ','tʃ'], 'l':['r'], 'r':['l'],
    'n':['ŋ'], 'ŋ':['n'], 'p':['b'], 'b':['p','v'], 'v':['b','f'], 'f':['v'],
    't':['d'], 'd':['t'], 'k':['g'], 'g':['k'],
  };
  function startIpaQuiz(){
    ipaQuizTarget = IPA_SOUNDS[Math.floor(Math.random()*IPA_SOUNDS.length)].symbol;
    const targetSound = IPA_SOUNDS.find(s=>s.symbol===ipaQuizTarget);
    const confusableSymbols = IPA_CONFUSABLES[ipaQuizTarget] || [];
    const confusableSounds = shuffleArr(confusableSymbols.map(sym=>IPA_SOUNDS.find(s=>s.symbol===sym)).filter(Boolean));
    const sameType = shuffleArr(IPA_SOUNDS.filter(s=>s.symbol!==ipaQuizTarget && s.type===targetSound.type && !confusableSymbols.includes(s.symbol)));
    const otherType = shuffleArr(IPA_SOUNDS.filter(s=>s.symbol!==ipaQuizTarget && s.type!==targetSound.type && !confusableSymbols.includes(s.symbol)));
    const distractors = [...confusableSounds, ...sameType, ...otherType].slice(0,3);
    ipaQuizWords = shuffleArr([targetSound, ...distractors]);
    ipaQuizSpoken = ''; ipaQuizAnswered = false; ipaQuizSelectedIdx = -1;
  }
  function bindIPA(){
    root.querySelectorAll('[data-ipa]').forEach(b=>b.addEventListener('click', ()=>{
      const s = IPA_SOUNDS.find(x=>x.symbol===b.dataset.ipa);
      ipaSelected = s.symbol;
      speakText(s.example, 'en-US');
    }));
    const playBtn = document.getElementById('ccIpaPlay');
    if (playBtn) playBtn.addEventListener('click', ()=>{
      ipaQuizSpoken = ipaQuizWords.find(w=>w.symbol===ipaQuizTarget).word;
      speakText(ipaQuizSpoken, 'en-US');
    });

  function evalDateForPeriod(periodIndex){

  function isEvalDay(date){

  function renderEvalCalendar(){
    const totalPeriods = Math.ceil(DATES.length/15);
    const currentPeriod = Math.floor((dayIndexNow()-1)/15);
    const today = new Date();
    const fmt = d => capFirst(d.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long'}));
    const rows = [];
    for (let p=0; p<totalPeriods; p++){
      const d = evalDateForPeriod(p);
      const isPast = d < today && !sameDay(d,today);
      const isNext = p===currentPeriod;
      rows.push(`<div class="cc-list-item" style="${isNext?'border:1.5px solid var(--orange)':''}">
        <span class="cc-list-box" style="flex:none;width:150px;${isPast?'text-decoration:line-through':''}">${fmt(d)}</span>
        <span class="cc-list-front" style="flex:1">${EN_TOPICS[p % EN_TOPICS.length]}</span>
      </div>`);
    }
    const nextDate = evalDateForPeriod(currentPeriod);
    const daysToNext = Math.max(0, Math.ceil((nextDate-today)/86400000));
    return `<p class="cc-section-title">Evaluation calendar</p>
      <div class="cc-feedback" style="margin-bottom:10px"><b>Your next evaluation is on ${fmt(nextDate)}</b>, in ${daysToNext} day${daysToNext===1?'':'s'}. It is a fixed day, not an open window: that day you need to demonstrate all four skills. The topic can be adjusted if you discuss it in Weekly Review, but the date does not move.</div>
      <div class="cc-list">${rows.join('')}</div>`;
  }

    const daysToNext = Math.max(0, Math.ceil((nextDate-today)/86400000));
    const fmtFull = d => capFirst(d.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long'}));

      (draft.quiz||[]).forEach((q,i)=>{
        const ans = document.getElementById(`ccEvalAns-${lang}-${i}`);
        if (ans) ans.addEventListener('input', ()=>{ draft.answers[i]=ans.value; saveDebounced(); });
        bindMic('ccEvalAnsMic-'+lang+'-'+i, `ccEvalAns-${lang}-${i}`, 'en-US');
      });
      const gradeBtn = document.getElementById(`ccEvalGrade-${lang}`);
      if (gradeBtn) gradeBtn.addEventListener('click', async ()=>{
        const fb = document.getElementById(`ccEvalFeedback-${lang}`);
        fb.style.display='block'; fb.className='cc-feedback loading'; fb.textContent='Correcting';
        gradeBtn.disabled = true;
        try {
          const topic = currentTopic(lang, dayIndexNow());
          const qa = draft.quiz.map((q,i)=>`Question: ${q} Answer: ${draft.answers[i]||'no answer'}`).join(' ');
          const result = await callAI(
            `Topic: ${topic}. Previous notes: ${draft.notes||'none'}. ${qa}`,
            `You are an evaluator of English for a B1 student moving to B2 who wants to sound native. Correct the grammar and vocabulary of the responses, and evaluate coherence with the topic. Give an overall score out of one hundred on the first line with the format Score: number. On the second line give three sub-scores out of one hundred separated by commas with the format Grammar: number, Vocabulary: number, Fluency: number. Then briefly explain what was right and the main errors, quoting the exact original phrase each time and showing the corrected version of at least one sentence with an error, and a concrete suggestion of what to practice in the next two weeks to raise the lowest sub-score. Maximum 180 words. Do not use em dashes or unusual symbols. Respond in English.`
          );
          const scoreMatch = result.match(/(?:Calificaci[oó]n|Score):\s*(\d{1,3})/i);
          const score = scoreMatch ? parseInt(scoreMatch[1]) : '-';
          fb.textContent = result;
          fb.className = 'cc-feedback';
          state.evalHistory.push({ date: todayISO(), lang, topic, score, feedback: result });
          state.evalDraft[lang] = Object.assign(emptyEvalDraft(), { reading: draft.reading, listening: draft.listening });
          save();
          setTimeout(render, 1400);
        } catch(e){ fb.textContent = 'There was an error grading, try again.'; fb.className='cc-feedback'; gradeBtn.disabled=false; }
      });
    });
    bindComp();
  }

  function bindComp(){
    ['en'].forEach(lang=>{
      ['reading','listening'].forEach(type=>{
        const comp = state.evalDraft[lang][type];
        const genBtn = document.getElementById(`ccCompGen-${lang}-${type}`);
        if (genBtn) genBtn.addEventListener('click', async ()=>{
          genBtn.disabled = true;
          try {
            const topic = currentTopic(lang, dayIndexNow());
            const result = await callAI(
              `Topic: ${topic}`,
              `Write a short text in English of seventy to one hundred words, appropriate for a B1 to B2 level student, about the given topic. Then write exactly three comprehension questions about that text, in English, numbered one to three. Respond with this exact format and nothing else: TEXT: the text here QUESTIONS: 1) first question 2) second question 3) third question`
            );
            const parts = result.split(/PREGUNTAS:|QUESTIONS:/i);
            const passage = (parts[0]||'').replace(/TEXTO:|TEXT:/i,'').trim();
            const qBlock = parts[1] || '';
            const questions = qBlock.split(/\d\)/).map(s=>s.trim()).filter(Boolean).slice(0,3);
            comp.passage = passage;
            comp.questions = questions.length ? questions : ['Question 1','Question 2','Question 3'];
            comp.answers = comp.questions.map(()=>'');
            comp.graded = false;
            save(); render();
          } catch(e){ alert('There was an error generating the content, try again.'); genBtn.disabled=false; }
        });
        const playBtn = document.getElementById(`ccCompPlay-${lang}`);
        if (playBtn && type==='listening') playBtn.addEventListener('click', ()=>{
          speakText(comp.passage, 'en-US');
        });
        comp.questions.forEach((q,i)=>{
          const ans = document.getElementById(`ccCompAns-${lang}-${type}-${i}`);
          if (ans) ans.addEventListener('input', ()=>{ comp.answers[i]=ans.value; saveDebounced(); });
        });
        const gradeBtn = document.getElementById(`ccCompGrade-${lang}-${type}`);
        if (gradeBtn) gradeBtn.addEventListener('click', async ()=>{
          const fb = document.getElementById(`ccCompFeedback-${lang}-${type}`);
          fb.style.display='block'; fb.className='cc-feedback loading'; fb.textContent='Correcting';
          gradeBtn.disabled = true;
          try {
            const qa = comp.questions.map((q,i)=>`Question: ${q} Answer: ${comp.answers[i]||'no answer'}`).join(' ');
            const result = await callAI(
              `Original text: ${comp.passage}. ${qa}`,
              `You are a ${type==='reading'?'reading':'listening'} comprehension evaluator. Compare the user's answers with the original text and determine if they are correct. Give a score out of one hundred on the first line with the format Score: number, based on how many were answered well. Then, for each answer, quote the specific part of the text relevant to it and explain exactly what was right or wrong. Maximum 100 words. Do not use em dashes or unusual symbols. Respond in English.`
            );
            const scoreMatch = result.match(/(?:Calificaci[oó]n|Score):\s*(\d{1,3})/i);
            const score = scoreMatch ? parseInt(scoreMatch[1]) : '-';
            fb.textContent = result;
            fb.className = 'cc-feedback';
            comp.graded = true;
            const topic = currentTopic(lang, dayIndexNow());
            state.evalHistory.push({ date: todayISO(), lang, topic: `${type==='reading'?'Reading':'Listening'}: ${topic}`, score, feedback: result });
            save();
            setTimeout(render, 1400);
          } catch(e){ fb.textContent = 'There was an error grading, try again.'; fb.className='cc-feedback'; gradeBtn.disabled=false; }
        });
      });
    });
  }

  function renderSetup(){
    root.innerHTML = `
      <div class="cc-header">
        <div class="cc-brand">
          <span class="cc-logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 4a4 4 0 0 1 8 0v6a4 4 0 0 1-8 0V4z"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <path d="M12 17v3"/>
            </svg>
          </span>
          <div><p class="cc-title">Speak Up</p><p class="cc-sub">English, DeepSeek R1 edition</p></div>
        </div>
      </div>
      <div class="cc-form">
        <label>Pega tu clave de API de OpenRouter (empieza con sk-or-v1-...)</label>
        <input id="ccKeyInput" type="password" placeholder="sk-or-v1-...">
        <button class="cc-add-btn" id="ccKeySave">Guardar y continuar</button>
        <div class="cc-feedback">You get it for free at openrouter.ai/keys (sign in with Google, click Create Key, no card required). This key is saved only in your browser (localStorage) and is used only to talk directly to the OpenRouter API. It is never sent anywhere else. If you open the app in another browser or computer, you will need to paste it there again.</div>
        <div class="cc-feedback">Note about the model: it uses the automatic free model router from OpenRouter (openrouter/free), which always picks a model available at that moment (DeepSeek R1, Llama, Qwen, etc.) without breaking if one stops being available.</div>
        <div class="cc-feedback">Notice: if you use voice dictation and you open this file by double clicking it (file:// protocol), the browser may block the microphone for security reasons. Text to speech (listening) does not have that problem.</div>
      </div>
    `;
    document.getElementById('ccKeySave').addEventListener('click', ()=>{
      let val = (document.getElementById('ccKeyInput').value||'');
      val = val.replace(/[\r\n\t]/g,'').replace(/\s+/g,'').trim();
      val = val.replace(/^bearer\s*/i,'');
      if (!val){ alert('Pega tu clave antes de continuar.'); return; }
      if (!val.startsWith('sk-or-')){ alert('Esa clave no parece de OpenRouter (debería empezar con sk-or-). Revísala e intenta de nuevo.'); return; }
      OR_KEY = val;
      try { localStorage.setItem(KEY_STORAGE, val); } catch(e){}
      init();
    });
  }

  async function init(){
    if (!OR_KEY){
      try { OR_KEY = localStorage.getItem(KEY_STORAGE) || ''; } catch(e){}
    }
    try { TMDB_KEY = localStorage.getItem(TMDB_KEY_STORAGE) || ''; } catch(e){}
    if (!OR_KEY){ renderSetup(); return; }
    await load();
    render();
  }
  init();
})();
</script>
