<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cimientos, centro de hábitos</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232D7FF9'/%3E%3Cstop offset='1' stop-color='%2316C172'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' fill='url(%23g)'/%3E%3Crect x='4' y='16' width='4.5' height='5' rx='1' fill='white'/%3E%3Crect x='9.75' y='11' width='4.5' height='10' rx='1' fill='white'/%3E%3Crect x='15.5' y='5' width='4.5' height='16' rx='1' fill='white'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

html, body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(160deg, #EAF2FF 0%, #EAFBF4 100%);
  display: flex;
  justify-content: center;
  padding: 28px 16px;
  box-sizing: border-box;
  transition: background .3s;
}
body.dark-page {
  background: linear-gradient(160deg, #12141A 0%, #1B2530 100%);
}

.cc-app {
  --bg: #FFFFFF;
  --surface: #F7F8FA;
  --surface2: #EFF1F5;
  --ink: #12141A;
  --ink-soft: #6B7280;
  --line: #E7E9ED;

  --blue: #2D7FF9;
  --green: #16C172;
  --orange: #FF7A29;
  --violet: #8B5CF6;
  --pink: #F43F5E;
  --teal: #14B8A6;

  --en: var(--blue);
  --pt: var(--green);
  --fc: var(--orange);
  --aj: var(--violet);
  --ex: var(--pink);
  --mind: var(--teal);

  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  border-radius: 20px;
  padding: 22px 20px 26px;
  max-width: 1600px;
  width: 100%;
  margin: 0 auto;
  border: 1px solid var(--line);
  box-shadow: 0 20px 50px rgba(30,40,80,0.12);
  position: relative;
  transition: background .3s, border-color .3s;
}
.cc-app.eval-mode {
  background: linear-gradient(180deg, #FFF3E8, #FFFFFF 140px);
  border-color: var(--orange);
}
.cc-app.eval-mode .cc-nav { background: #FFE7D2; }
.cc-app.dark {
  --bg: #16181D;
  --surface: #1F2228;
  --surface2: #262A32;
  --ink: #F0F1F3;
  --ink-soft: #9AA0AC;
  --line: #333842;
}
.cc-app.dark.eval-mode { background: linear-gradient(180deg, #2A2216, #16181D 140px); }
.cc-app.dark .cc-nav button.active { background: #F0F1F3; color: #16181D; }
.cc-app.dark .cc-check { background: #16181D; }
.cc-app.dark input, .cc-app.dark textarea, .cc-app.dark select { background: #16181D; color: var(--ink); }
.cc-app.dark .cc-cell { color: var(--ink-soft); }
.cc-app * { box-sizing: border-box; }

.cc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; gap:10px; flex-wrap:wrap; }
.cc-title { font-weight:800; font-size:21px; margin:0; letter-spacing:-0.01em; }
.cc-brand { display:flex; align-items:center; gap:10px; }
.cc-logo { width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--blue),var(--green)); display:flex; align-items:center; justify-content:center; flex:none; box-shadow:0 3px 10px rgba(45,127,249,0.35); }
.cc-sub { font-size:12px; color:var(--ink-soft); margin-top:3px; }
.cc-countdown { text-align:right; }
.cc-countdown .n { font-weight:800; font-size:24px; color:var(--orange); line-height:1; }
.cc-countdown .l { font-size:10.5px; color:var(--ink-soft); }

.cc-nav { display:flex; gap:6px; background:var(--surface); border-radius:14px; padding:5px; margin-bottom:20px; overflow-x:auto; }
.cc-nav button {
  flex:1; font-weight:600; font-size:12.5px; padding:9px 8px;
  border:none; border-radius:10px; background:transparent; color:var(--ink-soft); cursor:pointer;
  white-space:nowrap; transition:background .15s,color .15s;
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
}
.cc-nav button.active { background:linear-gradient(135deg,var(--blue),var(--violet)); color:#fff; box-shadow:0 2px 8px rgba(45,127,249,0.3); }

.cc-loading { text-align:center; padding:40px 0; color:var(--ink-soft); font-size:13px; }

/* HOY */
.cc-today-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.cc-today-date { font-size:16px; font-weight:700; }
.cc-phase-badge { font-size:11px; font-weight:600; color:var(--ink-soft); margin-top:3px; }
.cc-back { font-size:12px; color:var(--blue); background:none; border:none; cursor:pointer; font-weight:600; }

.cc-done-banner {
  display:none; align-items:center; gap:8px; background:linear-gradient(90deg,var(--green),var(--blue));
  color:#fff; font-weight:600; font-size:13px; padding:10px 14px; border-radius:12px; margin-bottom:16px;
}
.cc-done-banner.show { display:flex; }
.cc-eval-banner {
  display:flex; align-items:center; gap:8px; background:linear-gradient(90deg,var(--orange),var(--pink));
  color:#fff; font-weight:600; font-size:13px; padding:10px 14px; border-radius:12px; margin-bottom:16px;
  cursor:pointer;
}
.cc-banner-check { display:inline-block; width:16px; height:16px; border-radius:50%; background:rgba(255,255,255,0.28); position:relative; flex:none; }
.cc-banner-check::after { content:''; position:absolute; left:5px; top:6px; width:6px; height:4px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg); }

.cc-habit { border:1px solid var(--line); border-left:4px solid var(--card-accent, var(--line)); border-radius:14px; padding:14px 16px; margin-bottom:10px; box-shadow:0 1px 3px rgba(20,20,30,0.05); transition:box-shadow .2s, transform .15s; }
.cc-habit:hover { box-shadow:0 4px 14px rgba(20,20,30,0.09); }
.cc-habit-head { display:flex; align-items:center; gap:9px; margin-bottom:8px; }
.cc-habit-icon { width:26px; height:26px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex:none; }
.cc-habit-name { font-weight:700; font-size:14.5px; flex:1; }
.cc-habit-frac { font-size:12px; color:var(--ink-soft); font-weight:600; }

.cc-sub-row { display:flex; align-items:flex-start; gap:10px; padding:6px 0; }
.cc-check {
  width:22px; height:22px; border-radius:7px; border:2px solid var(--habit-color); background:#fff;
  cursor:pointer; flex:none; display:flex; align-items:center; justify-content:center; margin-top:1px;
  transition:transform .1s;
}
.cc-check:active { transform:scale(0.88); }
.cc-check.on { background:var(--habit-color); }
.cc-check.on::after { content:''; width:8px; height:6px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translate(1px,-1px); }
.cc-sub-text { font-size:13.5px; line-height:1.35; }
.cc-sub-hint { font-size:11.5px; color:var(--ink-soft); display:block; margin-top:1px; }

.cc-extra { margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); }
.cc-extra label { font-size:11px; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:4px; }
.cc-extra input, .cc-extra textarea {
  font-family:'Inter',sans-serif; font-size:13px; padding:8px 10px; border-radius:9px;
  border:1.5px solid var(--line); width:100%; margin-bottom:8px; color:var(--ink); background:#fff;
}
.cc-extra-btn { font-size:12px; font-weight:700; border:none; border-radius:20px; padding:8px 14px; cursor:pointer; color:#fff; display:inline-flex; align-items:center; gap:6px; transition:transform .12s, box-shadow .12s; box-shadow:0 2px 6px rgba(20,20,30,0.15); }
.cc-extra-btn:hover { transform:translateY(-1px); box-shadow:0 4px 10px rgba(20,20,30,0.2); }
.cc-extra-btn:active { transform:translateY(0); }
.cc-extra-btn:disabled { opacity:0.6; cursor:default; }
.cc-mic-inline {
  font-size:11px; font-weight:600; color:var(--ink-soft); background:var(--surface);
  border:1px solid var(--line); border-radius:20px; padding:5px 10px; cursor:pointer;
  display:inline-flex; align-items:center; gap:5px; margin-bottom:8px;
}
.cc-mic-inline.listening { background:var(--pink); color:#fff; border-color:var(--pink); }
.cc-feedback { margin-top:8px; background:var(--surface); border-radius:10px; padding:10px 12px; font-size:12.5px; line-height:1.5; white-space:pre-wrap; }
.cc-feedback.loading { color:var(--ink-soft); font-style:italic; }
.cc-suggest-wrap { margin-top:14px; }
.cc-suggest-list { margin-top:8px; }
.cc-wheel-row { display:flex; align-items:center; gap:16px; margin-bottom:8px; }
.cc-wheel-wrap { position:relative; width:70px; height:70px; flex:none; }
.cc-wheel {
  width:70px; height:70px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 2px var(--line);
  background: conic-gradient(var(--blue) 0deg 45deg, var(--green) 45deg 90deg, var(--orange) 90deg 135deg, var(--violet) 135deg 180deg, var(--pink) 180deg 225deg, var(--blue) 225deg 270deg, var(--green) 270deg 315deg, var(--orange) 315deg 360deg);
  transition: transform 2s cubic-bezier(.2,.8,.2,1);
}
.cc-wheel-pointer {
  position:absolute; top:-6px; left:50%; transform:translateX(-50%);
  width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-top:10px solid var(--ink); z-index:2;
}
.cc-img-box { background:var(--surface2); border-radius:12px; padding:8px; margin-bottom:8px; display:flex; align-items:center; justify-content:center; }
.cc-img-caption { font-size:12px; font-style:italic; color:var(--ink-soft); text-align:center; margin-bottom:10px; }

/* PROGRESO */
.cc-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:22px; }
.cc-stat { background:var(--surface); border-radius:12px; padding:12px 8px; text-align:center; border-top:3px solid var(--blue); }
.cc-stat:nth-child(2){ border-top-color:var(--green); }
.cc-stat:nth-child(3){ border-top-color:var(--orange); }
.cc-stat:nth-child(4){ border-top-color:var(--violet); }
.cc-stat .n { font-size:19px; font-weight:800; }
.cc-stat .l { font-size:10px; color:var(--ink-soft); margin-top:2px; }

.cc-section-title { font-size:14.5px; font-weight:700; margin:22px 0 10px; }

.cc-months { display:flex; flex-wrap:wrap; gap:12px; }
.cc-month { background:var(--surface); border-radius:12px; padding:9px; flex:1 1 200px; min-width:190px; }
.cc-month-label { font-size:11px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; display:block; }
.cc-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cc-cell { aspect-ratio:1; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:9px; cursor:pointer; color:var(--ink-soft); border:1.5px solid transparent; background:var(--surface2); }
.cc-cell.pad { visibility:hidden; cursor:default; }
.cc-cell.future { opacity:0.3; cursor:default; }
.cc-cell.selected { border-color:var(--ink); }

.cc-bars { display:flex; flex-direction:column; gap:10px; }
.cc-bar-row { display:flex; align-items:center; gap:10px; }
.cc-bar-label { font-size:12.5px; font-weight:600; width:120px; flex:none; }
.cc-bar-track { flex:1; height:9px; background:var(--surface2); border-radius:6px; overflow:hidden; }
.cc-bar-fill { height:100%; border-radius:6px; transition:width .3s; }
.cc-bar-pct { font-size:11px; width:36px; text-align:right; color:var(--ink-soft); flex:none; }

/* VOCAB */
.cc-vocab-tabs { display:flex; gap:6px; margin-bottom:14px; }
.cc-vtab { font-size:12px; font-weight:600; padding:7px 12px; border-radius:20px; border:1.5px solid var(--line); background:#fff; color:var(--ink-soft); cursor:pointer; }
.cc-vtab.active { border-color:var(--ink); color:var(--ink); }

.cc-empty { text-align:center; padding:36px 10px; color:var(--ink-soft); font-size:13px; }

.cc-card { background:var(--surface); border-radius:16px; padding:32px 20px; text-align:center; min-height:140px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; position:relative; }
.cc-card-cat { position:absolute; top:12px; left:12px; font-size:10px; font-weight:700; color:#fff; padding:3px 9px; border-radius:20px; }
.cc-card-front { font-size:21px; font-weight:800; }
.cc-card-back { font-size:15px; }
.cc-card-example { font-size:11.5px; color:var(--ink-soft); max-width:400px; }
.cc-card-hint { font-size:10.5px; color:var(--ink-soft); }

.cc-grade-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:14px; }
.cc-grade-btn { font-size:11.5px; font-weight:600; padding:11px 6px; border-radius:12px; cursor:pointer; border:1.5px solid var(--line); background:#fff; line-height:1.3; }
.cc-grade-btn.bad { border-color:var(--pink); color:var(--pink); }
.cc-grade-btn.mid { border-color:var(--orange); color:var(--orange); }
.cc-grade-btn.good { border-color:var(--green); color:var(--green); }
.cc-grade-btn:active { transform:scale(0.96); }

.cc-form { display:flex; flex-direction:column; gap:9px; background:var(--surface); border-radius:14px; padding:16px; margin-bottom:16px; }
.cc-form label { font-size:11px; font-weight:600; color:var(--ink-soft); }
.cc-form input, .cc-form select, .cc-form textarea { font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 10px; border-radius:9px; border:1.5px solid var(--line); background:#fff; color:var(--ink); width:100%; }
.cc-add-btn { font-size:13px; font-weight:700; background:var(--ink); color:#fff; border:none; border-radius:20px; padding:11px; cursor:pointer; margin-top:2px; }

.cc-list { display:flex; flex-direction:column; gap:7px; }
.cc-list-item { display:flex; align-items:center; gap:9px; background:var(--surface); border-radius:10px; padding:9px 12px; }
.cc-list-cat { font-size:9px; font-weight:700; color:#fff; padding:2px 7px; border-radius:20px; flex:none; }
.cc-list-front { font-weight:600; font-size:13px; flex:1; }
.cc-list-back { font-size:12px; color:var(--ink-soft); flex:1; }
.cc-list-box { font-size:10px; color:var(--ink-soft); flex:none; }
.cc-del { background:none; border:none; color:var(--pink); font-size:11px; font-weight:600; cursor:pointer; flex:none; }

/* GUIA */
.cc-acc { border:1px solid var(--line); border-radius:14px; margin-bottom:8px; overflow:hidden; }
.cc-acc-head { display:flex; align-items:center; gap:10px; padding:13px 16px; cursor:pointer; background:#fff; }
.cc-acc-dot { width:10px; height:10px; border-radius:50%; flex:none; }
.cc-acc-title { font-weight:600; font-size:14px; flex:1; }
.cc-acc-arrow-shape { display:inline-block; width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent; border-top:5px solid var(--ink-soft); transition:transform .15s; flex:none; }
.cc-acc.open .cc-acc-arrow-shape { transform:rotate(180deg); }
.cc-acc-body { display:none; padding:0 16px 16px; font-size:13px; line-height:1.55; color:var(--ink); }
.cc-acc.open .cc-acc-body { display:block; }
.cc-acc-body ul { margin:6px 0; padding-left:18px; }
.cc-acc-body li { margin-bottom:4px; }
.cc-acc-body b { font-weight:700; }

.cc-footer { display:flex; justify-content:space-between; align-items:center; margin-top:20px; padding-top:14px; border-top:1px solid var(--line); }
.cc-note { font-size:10.5px; color:var(--ink-soft); }
.cc-reset { font-size:10.5px; font-weight:600; color:var(--pink); background:none; border:1.5px solid var(--pink); border-radius:20px; padding:6px 12px; cursor:pointer; }

@media (max-width:520px){
  .cc-stats{ grid-template-columns:repeat(2,1fr); }
  .cc-title{ font-size:18px; }
}
</style>
</head>
<body>

<div class="cc-app" id="ccApp"><div class="cc-loading">Cargando</div></div>

<script>
(function(){
  const HABITS = [
    { id:'en', name:'Inglés', color:'--en',
      subtasks:[
        { id:'drill', text:'Shadowing fonético y grabación (30 minutos)', hint:()=>"Rachel's English, fijo todos los días" },
        { id:'anki',  text:'Repaso de vocabulario (15 minutos)', hint:()=>'En la app de inglés' },
        { id:'input', text:'Menú de input (25 a 30 minutos)', hint:(d,phase)=>{ const podcast = phase===1?'Podcast (Speak English With Vanessa)':phase===2?'Podcast (Philosophize This)':'Podcast (This American Life)'; return [podcast,'StrawberryPark (caza de slang)','Serie con subtítulos','Música (letras)','StrawberryPark (caza de slang)','Sesión larga: serie o podcast completo','Repaso, sin input nuevo'][d]; } },
        { id:'output', text:'Menú de output (10 a 15 minutos)', hint:d=>['Self-talk: tu día','Grabarte explicando un tema','Discord (voz)','Self-talk: debate filosófico','Discord (voz)','Discord opcional','Descanso, sin output nuevo'][d] },
      ]},
    { id:'pt', name:'Portugués', color:'--pt',
      subtasks:[
        { id:'main', text:'Bloque principal (30 a 35 minutos)', hint:(d,phase)=>{
          const f1 = ['Tá Falado','Shadowing con Marcia Macedo','Tá Falado','Shadowing con Marcia Macedo','Tá Falado','Serie o película en portugués','Repaso general'];
          const f2 = ['Serie brasileña con subtítulos en portugués','Conversación en Discord o HelloTalk','Serie brasileña con subtítulos en portugués','Conversación en Discord o HelloTalk','Repaso de Tá Falado','Película completa en portugués','Repaso general'];
          const f3 = ['Conversación sin cambiar al español','Conversación en Discord o HelloTalk','Conversación sin cambiar al español','Conversación en Discord o HelloTalk','Repaso libre','Película o serie completa en portugués','Repaso general'];
          return (phase===1?f1:phase===2?f2:f3)[d];
        } },
        { id:'vocab', text:'Anotar una palabra o falso amigo nuevo', hint:()=>'Directo a tu lista de diferencias con el español' },
      ]},
    { id:'fc', name:'Lectura', color:'--fc',
      subtasks:[
        { id:'content', text:'Lectura del día (30 a 40 minutos)', hint:d=>['Lectura','Lectura','Lectura','Lectura','Lectura','Capítulo largo','Repaso de la semana'][d] },
      ]},
    { id:'aj', name:'Ajedrez', color:'--aj',
      subtasks:[
        { id:'practice', text:'Sesión de hoy (30 a 45 minutos)', hint:d=>['Puzzles tácticos','Partida y análisis posterior','Puzzles tácticos','Lección con GothamChess','Partida libre','Puzzles largos, repaso semanal','Descanso u opcional'][d] },
      ]},
    { id:'ex', name:'Ejercicio', color:'--ex',
      subtasks:[
        { id:'workout', text:'Sesión de hoy (30 a 45 minutos)', hint:d=>['Cardio','Fuerza','Cardio','Fuerza','Cardio','Actividad larga','Descanso o caminata'][d] },
      ]},
    { id:'mind', name:'Mindfulness', color:'--mind',
      subtasks:[
        { id:'meditate', text:'Meditar (10 a 15 minutos)', hint:d=>['Respiración','Body scan','Meditación guiada','Silencio','Respiración','Sesión larga de fin de semana','Descanso u opcional'][d] },
      ]},
  ];

  const GUIDE = [
    { id:'sistema', name:'Cómo cambian las actividades', color:'#12141A', body:`
      Las actividades tienen dos capas. La primera es semanal: cada día de la semana trae una sugerencia distinta dentro del mismo hábito, para que no se sienta repetitivo, y esa parte se repite cada semana.
      La segunda es de fondo, y esa sí avanza con el calendario. El plan tiene tres fases: fase 1 en julio y agosto, fase 2 en septiembre y octubre, fase 3 en noviembre y diciembre. Por ejemplo en portugués, la fase 1 se apoya en Tá Falado, la fase 2 mete series e intercambio en Discord, y la fase 3 es conversación real. En la pestaña Hoy vas a ver siempre una insignia con la fase en la que estás.
      Además, en la pestaña Revisión puedes escribirle a Claude cada semana cómo te fue, y la respuesta se ajusta según tus estadísticas reales y lo que hayas contado antes, no es un mensaje genérico.
    `},
    { id:'en', name:'Inglés: sonar nativo', color:'#2D7FF9', body:`
      <b>Fijo diario:</b> shadowing con Rachel's English (20 minutos), grabarte y comparar (10 minutos), vocabulario en contexto (15 minutos).
      <b>Menú de input:</b>
      <ul>
        <li>Podcast: empiezas con Speak English With Vanessa, luego avanzas a Philosophize This, y en la última fase This American Life</li>
        <li>StrawberryPark, cazando slang</li>
        <li>Serie con subtítulos</li>
        <li>Música, trabajando las letras</li>
      </ul>
      <b>Menú de output:</b>
      <ul>
        <li>Self-talk sobre tu día, o debatiendo una postura filosófica</li>
        <li>Discord de voz</li>
        <li>Grabarte explicando un tema que leíste</li>
      </ul>
      <b>Fonética por semanas:</b>
      <ul>
        <li>Semanas 1 y 2: vocales tensas y relajadas</li>
        <li>Semanas 3 y 4: la erre americana</li>
        <li>Semanas 5 y 6: la t suave entre vocales, y la unión entre palabras</li>
        <li>Semanas 7 y 8: entonación de la oración completa</li>
      </ul>
      <b>Slang:</b> de cada video o canción, anota 3 a 5 expresiones con su contexto y pásalas al vocabulario de la app de inglés.

  function renderSummary(numDays){
    const today = new Date();
    const days = [];
    for (let i=0;i<numDays;i++){ const d=new Date(today); d.setDate(d.getDate()-i); if (d>=START) days.push(d); }
    return `<div class="cc-list">
      ${HABITS.map(h=>{
        const ratios = days.map(d=>{
          const dd = dayData(iso(d));
          return h.subtasks.length ? h.subtasks.filter(s=>dd[h.id][s.id]).length/h.subtasks.length : 0;
        });
        const avgPct = ratios.length ? Math.round((ratios.reduce((a,b)=>a+b,0)/ratios.length)*100) : 0;
        const fullDays = days.filter((d,i)=>ratios[i]===1).length;
        return `<div class="cc-list-item">
          <span class="cc-habit-icon" style="background:var(${h.color})">${icon(h.id,'#fff',14)}</span>
          <span class="cc-list-front" style="flex:1">${h.name}</span>
          <span class="cc-list-back">${fullDays}/${days.length} días completos</span>
          <span class="cc-list-box">${avgPct}%</span>
        </div>`;
      }).join('')}
    </div>`;
  }

        const cat=document.getElementById('ccCat').value;
        if (!front||!back) return;
        addCard(front,back,example,cat); render();
        setTimeout(()=>{ const f=document.getElementById('ccFront'); if(f) f.focus(); },0);
      });
    }
    if (vocabTab==='list'){
      root.querySelectorAll('.cc-del').forEach(b=>b.addEventListener('click',()=>{ deleteCard(b.dataset.id); render(); }));
    }
  }

  function renderGuia(){
    return GUIDE.map(g=>`
      <div class="cc-acc ${openAcc===g.id?'open':''}" data-acc="${g.id}">
        <div class="cc-acc-head">
          <span class="cc-acc-dot" style="background:${g.color}"></span>
          <span class="cc-acc-title">${g.name}</span>
          <span class="cc-acc-arrow-shape"></span>
        </div>
        <div class="cc-acc-body">${g.body}</div>
      </div>
    `).join('');
  }
  function bindGuia(){
    root.querySelectorAll('.cc-acc-head').forEach(h=>h.addEventListener('click',()=>{
      const id = h.parentElement.dataset.acc;
      openAcc = openAcc===id ? null : id;
      render();
    }));
  }

  function renderRevision(){
    const sorted = [...state.checkins].sort((a,b)=>b.date.localeCompare(a.date));
    return `
      <p class="cc-section-title">Ajustes personalizados activos</p>
      <div class="cc-list" id="ccAdjList">
        ${state.adjustments.length===0 ? '<div class="cc-empty">Todavía no hay ajustes guardados.</div>' :
          state.adjustments.map((a,i)=>`<div class="cc-list-item"><span class="cc-list-front" style="flex:1">${a}</span><button class="cc-del" data-i="${i}">Quitar</button></div>`).join('')}
      </div>
      <div class="cc-extra" style="border-top:none;margin-top:10px">
        <input id="ccNewAdj" placeholder="Por ejemplo: prefiero pop en vez de trap para la práctica musical">
        <button class="cc-extra-btn" id="ccAddAdj" style="background:var(--ink)">Guardar ajuste</button>
      </div>
      <p class="cc-section-title">Cuéntale a Claude cómo va tu semana</p>
      <div class="cc-form">
        <label>Qué te costó, qué se sintió bien, dónde notas que te estancas o qué te gustaría cambiar</label>
        <textarea id="ccCheckinText" rows="4" placeholder="Escribe libremente sobre cómo va tu semana"></textarea>
        <button class="cc-add-btn" id="ccCheckinBtn">Enviar y recibir feedback</button>
      </div>
      <div id="ccCheckinFeedback"></div>
      <p class="cc-section-title">Historial</p>
      ${sorted.length===0 ? '<div class="cc-empty">Todavía no registraste ninguna revisión semanal.</div>' :
        sorted.map(c=>`<div class="cc-habit">
          <div class="cc-habit-frac" style="margin-bottom:6px">${c.date}</div>
          <div style="font-size:13px;margin-bottom:8px">${c.text}</div>
          <div class="cc-feedback">${c.feedback}</div>
        </div>`).join('')
      }
    `;
  }
  function bindRevision(){
    root.querySelectorAll('#ccAdjList .cc-del').forEach(b=>b.addEventListener('click',()=>{
      state.adjustments.splice(parseInt(b.dataset.i),1); save(); render();
    }));
    const addAdjBtn = document.getElementById('ccAddAdj');
    if (addAdjBtn) addAdjBtn.addEventListener('click', ()=>{
      const input = document.getElementById('ccNewAdj');
      const v = (input.value||'').trim();
      if (!v) return;
      state.adjustments.push(v); save(); render();
    });
    const btn = document.getElementById('ccCheckinBtn');
    if (!btn) return;
    btn.addEventListener('click', async ()=>{
      const textarea = document.getElementById('ccCheckinText');
      const text = (textarea.value||'').trim();
      const box = document.getElementById('ccCheckinFeedback');
      if (!text){ box.innerHTML = '<div class="cc-feedback">Escribe algo primero.</div>'; return; }
      box.innerHTML = '<div class="cc-feedback loading">Leyendo tu semana</div>';
      btn.disabled = true;
      try {
        const statsLines = HABITS.map(h=>`${h.name}: ${habitPct(h)} por ciento de cumplimiento`).join(', ');
        const streaks = computeStreaks();
        const prevSummary = state.checkins.slice(-2).map(c=>`El ${c.date} dijo: ${c.text}`).join(' ');
        const result = await callAI(
          `Estadísticas actuales: ${statsLines}. Racha actual: ${streaks.current} días. Mejor racha: ${streaks.best} días. Revisiones previas: ${prevSummary || 'ninguna todavía'}. Reflexión de esta semana: ${text}`,
          'Eres un coach breve y honesto para un plan de estudio de seis meses que incluye inglés, portugués, filosofía y ciencia, ajedrez y ejercicio. Con base en las estadísticas y en la reflexión del usuario, da retroalimentación personalizada de cuatro a seis frases: reconoce lo que va bien, señala con honestidad si algo se está estancando, y sugiere un ajuste concreto y pequeño para la próxima semana. Si el usuario pide cambiar o quitar algo que consideras importante para su meta principal, dilo con claridad y explica por qué no lo harías, en vez de aceptar automáticamente. No repitas el plan completo de forma genérica, y ten en cuenta lo que el usuario haya dicho en revisiones anteriores si aplica. No uses guiones largos ni símbolos poco comunes. Al final, en una línea nueva y separada, escribe exactamente: AJUSTE_SUGERIDO: seguido del ajuste concreto que propusiste, en máximo quince palabras, redactado como una regla aplicable a futuro. Si no hay ningún ajuste claro que sugerir, escribe AJUSTE_SUGERIDO: ninguno. Responde en español.'
        );
        let feedback = result || 'No se pudo generar el feedback, intenta de nuevo.';
        let suggestion = '';
        const m = feedback.match(/AJUSTE_SUGERIDO:\s*(.+)$/im);
        if (m){
          suggestion = m[1].trim();
          feedback = feedback.replace(/AJUSTE_SUGERIDO:.*$/im,'').trim();
        }
        state.checkins.push({ date: todayISO(), text, feedback });
        save();
        const hasSuggestion = suggestion && !/^ninguno\.?$/i.test(suggestion);
        box.innerHTML = `<div class="cc-feedback">${feedback}</div>` + (hasSuggestion ? `
          <div class="cc-feedback" style="margin-top:8px;border:1.5px dashed var(--violet)">
            <b>Ajuste sugerido:</b> ${suggestion}
            <div style="margin-top:8px;display:flex;gap:8px">
              <button class="cc-extra-btn" id="ccApplyAdj" style="background:var(--green)">Aplicar este ajuste</button>
              <button class="cc-extra-btn" id="ccSkipAdj" style="background:var(--ink-soft)">Dejarlo así</button>
            </div>
          </div>
        ` : '');
        if (hasSuggestion){
          document.getElementById('ccApplyAdj').addEventListener('click', ()=>{
            state.adjustments.push(suggestion); save();
            box.querySelector('div[style*="dashed"]').innerHTML = '<b>Ajuste aplicado.</b> Ya se está usando en las próximas correcciones y sugerencias.';
          });
          document.getElementById('ccSkipAdj').addEventListener('click', ()=>{
            box.querySelector('div[style*="dashed"]').innerHTML = 'Lo dejamos como está, sin aplicar ningún cambio.';
          });
        }
        textarea.value = '';
      } catch(e){ box.innerHTML = '<div class="cc-feedback">Hubo un error, intenta de nuevo.</div>'; }
      btn.disabled = false;
    });
  }

  function renderAjustes(){
    return `
      <p class="cc-section-title">Apariencia</p>
      <div class="cc-habit">
        <div class="cc-sub-row">
          <button class="cc-check ${state.settings.dark?'on':''}" style="--habit-color:var(--violet)" id="ccToggleDark"></button>
          <div class="cc-sub-text">Modo oscuro<span class="cc-sub-hint">Cambia el fondo y los tonos de superficie, los colores vivos se mantienen</span></div>
        </div>
        <div class="cc-sub-row">
          <button class="cc-check ${state.settings.sound?'on':''}" style="--habit-color:var(--violet)" id="ccToggleSound"></button>
          <div class="cc-sub-text">Efectos de sonido<span class="cc-sub-hint">Un clic suave al marcar, un sonido distinto al completar el día</span></div>
        </div>
        <div class="cc-sub-row">
          <button class="cc-check ${state.settings.music?'on':''}" style="--habit-color:var(--violet)" id="ccToggleMusic"></button>
          <div class="cc-sub-text">Música de fondo mientras trabajas<span class="cc-sub-hint">Un ambiente suave y relajante generado en el momento, sin depender de ninguna pista con derechos de autor</span></div>
        </div>
      </div>
      <p class="cc-section-title">Cuenta</p>
      <div class="cc-habit">
        <button class="cc-extra-btn" id="ccChangeKeyBtn" style="background:var(--ink)">Cambiar clave de OpenRouter</button>
        <button class="cc-extra-btn" id="ccResetBtn" style="background:var(--pink);margin-left:8px">Reiniciar todos los datos</button>
      </div>
    `;
  }
  function bindAjustes(){
    const darkBtn = document.getElementById('ccToggleDark');
    if (darkBtn) darkBtn.addEventListener('click', ()=>{
      state.settings.dark = !state.settings.dark; save(); render();
    });
    const soundBtn = document.getElementById('ccToggleSound');
    if (soundBtn) soundBtn.addEventListener('click', ()=>{
      state.settings.sound = !state.settings.sound; save();
      if (state.settings.sound) playClick();
      render();
    });
    const musicBtn = document.getElementById('ccToggleMusic');
    if (musicBtn) musicBtn.addEventListener('click', ()=>{
      state.settings.music = !state.settings.music; save();
      if (state.settings.music) startAmbient(); else stopAmbient();
      render();
    });
    const changeKeyBtn = document.getElementById('ccChangeKeyBtn');
    if (changeKeyBtn) changeKeyBtn.addEventListener('click', ()=>{
      if (confirm('¿Quieres reemplazar la clave de API guardada?')) {
        try { localStorage.removeItem(KEY_STORAGE); } catch(e){}
        OR_KEY = '';
        renderSetup();
      }
    });
    const resetBtn = document.getElementById('ccResetBtn');
    if (resetBtn) resetBtn.addEventListener('click', async ()=>{
      if (confirm('¿Borrar todo el progreso, hábitos y vocabulario? No se puede deshacer.')) {
        const keepSettings = state.settings;
        state = { days:{}, cards:[], checkins:[], adjustments:[], evalHistory:[], readingHistory:[], settings:keepSettings };
        await save(); render();
      }
    });
  }

  function computeAchievements(){
    const passedEvals = state.evalHistory.filter(e=>typeof e.score==='number' && e.score>=60).length;
    const masteredWords = state.cards.filter(c=>c.box>=6).length;
    const streaks = computeStreaks();
    const checkinsCount = state.checkins.length;
    return [
      { id:'hat', name:'Primer paso', done: passedEvals>=1, desc:'Aprueba tu primera evaluación (60 o más)' },
      { id:'glasses', name:'Constancia visible', done: passedEvals>=3, desc:'Aprueba tres evaluaciones' },
      { id:'scarf', name:'Vocabulario que se queda', done: masteredWords>=10, desc:'Domina diez palabras en Vocabulario' },
      { id:'cape', name:'Racha de fondo', done: streaks.best>=15, desc:'Alcanza una racha de quince días completos' },
      { id:'medal', name:'Cinco evaluaciones', done: passedEvals>=5, desc:'Aprueba cinco evaluaciones' },
      { id:'crown', name:'Hábito de reflexión', done: checkinsCount>=4, desc:'Completa cuatro revisiones semanales' },
    ];
  }
  function renderLogros(){
    const ach = computeAchievements();
    const doneCount = ach.filter(a=>a.done).length;
    return `
      <div class="cc-stats" style="grid-template-columns:1fr">
        <div class="cc-stat"><div class="n">${doneCount}/${ach.length}</div><div class="l">Logros desbloqueados</div></div>
      </div>
      <p class="cc-section-title">Tus logros</p>
      <div class="cc-list">
        ${ach.map(a=>`<div class="cc-list-item">
          <span class="cc-habit-icon" style="background:${a.done?'var(--green)':'var(--surface2)'}">${icon(a.done?'target':'settings', a.done?'#fff':'var(--ink-soft)',14)}</span>
          <span class="cc-list-front" style="flex:1">${a.name}${a.done?'':` <span style="color:var(--ink-soft);font-weight:400">(${a.desc})</span>`}</span>
          <span class="cc-list-box">${a.done?'Desbloqueado':'Bloqueado'}</span>
        </div>`).join('')}
      </div>
    `;
  }

  function evalDateForPeriod(periodIndex){
    const day = Math.min(DATES.length-1, periodIndex*15+14);
    return DATES[day];
  }
  function isEvalDay(date){
    const idx = Math.ceil((date-START)/86400000)+1;
    return idx % 15 === 0;
  }
  function renderEvalCalendar(){
    const totalPeriods = Math.ceil(DATES.length/15);
    const currentPeriod = Math.floor((dayIndexNow()-1)/15);
    const today = new Date();
    const fmt = d => capFirst(d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}));
    const rows = [];
    for (let p=0; p<totalPeriods; p++){
      const d = evalDateForPeriod(p);
      const isPast = d < today && !sameDay(d,today);
      const isNext = p===currentPeriod;
      rows.push(`<div class="cc-list-item" style="${isNext?'border:1.5px solid var(--orange)':''}">
        <span class="cc-list-box" style="flex:none;width:150px;${isPast?'text-decoration:line-through':''}">${fmt(d)}</span>
        <span class="cc-list-front" style="flex:1">${EN_TOPICS[p % EN_TOPICS.length]}</span>
        <span class="cc-list-back" style="flex:1">${PT_TOPICS[p % PT_TOPICS.length]}</span>
      </div>`);
    }
    const nextDate = evalDateForPeriod(currentPeriod);
    const daysToNext = Math.max(0, Math.ceil((nextDate-today)/86400000));
    return `<p class="cc-section-title">Calendario de evaluaciones</p>
      <div class="cc-feedback" style="margin-bottom:10px"><b>Tu próxima evaluación es el ${fmt(nextDate)}</b>, en ${daysToNext} día${daysToNext===1?'':'s'}. Es un día fijo, no una ventana abierta: ese día te toca rendir cuentas de las cuatro destrezas. El tema puede ajustarse si lo hablas en Revisión, pero la fecha no se mueve.</div>
      <div class="cc-list">${rows.join('')}</div>`;
  }
  function renderSetup(){
    root.innerHTML = `
      <div class="cc-header">
        <div class="cc-brand">
          <span class="cc-logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 4a4 4 0 0 1 8 0v6a4 4 0 0 1-8 0V4z"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <path d="M12 17v3"/>
            </svg>
          <span class="cc-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff">
              <rect x="4" y="16" width="4.5" height="5" rx="1"/>
              <rect x="9.75" y="11" width="4.5" height="10" rx="1"/>
              <rect x="15.5" y="5" width="4.5" height="16" rx="1"/>
            </svg>
          </span>
          <div><p class="cc-title">Cimientos</p><p class="cc-sub">Hub central, edición DeepSeek R1</p></div>
        </div>
      </div>
      <div class="cc-form">
        <label>Pega tu clave de API de OpenRouter (empieza con sk-or-v1-...)</label>
        <input id="ccKeyInput" type="password" placeholder="sk-or-v1-...">
        <button class="cc-add-btn" id="ccKeySave">Guardar y continuar</button>
        <div class="cc-feedback">La consigues gratis en openrouter.ai/keys (inicia sesión con Google, clic en Create Key, no pide tarjeta). Esta clave se guarda solo en tu navegador (localStorage) y se usa únicamente para hablar directo con la API de OpenRouter. Nunca se envía a ningún otro lado. Si abres la app en otro navegador o computadora, tendrás que pegarla de nuevo ahí.</div>
        <div class="cc-feedback">Nota sobre el modelo: usa el enrutador automático de modelos gratis de OpenRouter (openrouter/free), que siempre elige un modelo disponible en ese momento (DeepSeek R1, Llama, Qwen, etc.) sin que se rompa si uno deja de estar disponible.</div>
        <div class="cc-feedback">Aviso: si usas el dictado por voz y abres este archivo haciendo doble clic (protocolo file://), es posible que el navegador bloquee el micrófono por seguridad. La lectura en voz alta (escucha) no tiene ese problema.</div>
      </div>
    `;
    document.getElementById('ccKeySave').addEventListener('click', ()=>{
      let val = (document.getElementById('ccKeyInput').value||'');
      val = val.replace(/[\r\n\t]/g,'').replace(/\s+/g,'').trim();
      val = val.replace(/^bearer\s*/i,'');
      if (!val){ alert('Pega tu clave antes de continuar.'); return; }
      if (!val.startsWith('sk-or-')){ alert('Esa clave no parece de OpenRouter (debería empezar con sk-or-). Revísala e intenta de nuevo.'); return; }
      OR_KEY = val;
      try { localStorage.setItem(KEY_STORAGE, val); } catch(e){}
      init();
    });
  }

  async function init(){
    if (!OR_KEY){
      try { OR_KEY = localStorage.getItem(KEY_STORAGE) || ''; } catch(e){}
    }
    if (!OR_KEY){ renderSetup(); return; }
    await load();
    render();
  }
  init();
})();
</script>

</body>
</html>
